services:
  gateway:
    build: ./gateway
    ports:
      - "8000:8080"
    environment:
      - VLLM_BASE_URL=http://vllm:8000
      - API_KEYS=${API_KEYS:-}
      - VLLM_API_KEY=${VLLM_API_KEY:-}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-60}
      - MAX_CONCURRENT_REQUESTS=${MAX_CONCURRENT_REQUESTS:-32}
    depends_on:
      - vllm
    restart: unless-stopped

  vllm:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_TOKEN=${HF_TOKEN:-}
    command: >
      --model ${VLLM_MODEL:-microsoft/Phi-3-mini-4k-instruct}
      --host 0.0.0.0
      --port 8000
      --gpu-memory-utilization 0.88
      --max-model-len 4096
      --max-num-seqs 16
    volumes:
      - vllm_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  vllm_cache:
